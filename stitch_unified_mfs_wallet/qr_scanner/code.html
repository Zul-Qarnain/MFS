<style>
        .qr-bracket {
            width: 40px;
            height: 40px;
            border-color: #ffffff;
            position: absolute;
        }
        .qr-bracket-tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 16px; }
        .qr-bracket-tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 16px; }
        .qr-bracket-bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 16px; }
        .qr-bracket-br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 16px; }
        
        .scan-line {
            height: 2px;
            width: 100%;
            background: linear-gradient(to right, transparent, #2563eb, transparent);
            position: absolute;
            animation: scan 3s ease-in-out infinite;
            box-shadow: 0 0 15px #2563eb;
        }
        
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .camera-grain {
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
        }

<script>
        // Micro-interaction for Flashlight
        const flashlightBtn = document.getElementById('flashlightBtn');
        let isFlashOn = false;

        flashlightBtn.addEventListener('click', () => {
            isFlashOn = !isFlashOn;
            const icon = flashlightBtn.querySelector('.material-symbols-outlined');
            const bg = flashlightBtn.querySelector('div');
            
            if (isFlashOn) {
                icon.style.fontVariationSettings = "'FILL' 1";
                bg.classList.add('bg-primary');
                bg.classList.remove('bg-white/10');
            } else {
                icon.style.fontVariationSettings = "'FILL' 0";
                bg.classList.add('bg-white/10');
                bg.classList.remove('bg-primary');
            }
        });

        // Simulate successful scan vibration/sound feedback logic
