<script>
        let currentAmount = "0";
        const amountDisplay = document.getElementById('amount-display');
        const amountWords = document.getElementById('amount-words');

        function updateDisplay() {
            amountDisplay.innerText = currentAmount === "" ? "0" : currentAmount;
            
            if (currentAmount === "" || currentAmount === "0") {
                amountWords.classList.add('opacity-0');
            } else {
                amountWords.classList.remove('opacity-0');
                amountWords.innerText = numberToWords(currentAmount) + " Taka Only";
            }
        }

        function appendNumber(num) {
            if (currentAmount === "0" && num !== ".") {
                currentAmount = num;
            } else {
                if (num === "." && currentAmount.includes(".")) return;
                if (currentAmount.length < 10) {
                    currentAmount += num;
                }
            }
            updateDisplay();
        }

        function deleteNumber() {
            if (currentAmount.length > 1) {
                currentAmount = currentAmount.slice(0, -1);
            } else {
                currentAmount = "0";
            }
            updateDisplay();
        }

        function numberToWords(n) {
            // Simple logic for illustration
            const num = parseFloat(n);
            if (isNaN(num)) return "";
            return num.toLocaleString('en-IN') + "";
        }

        // Keydown support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === 'Backspace') deleteNumber();
        });
    </script>
