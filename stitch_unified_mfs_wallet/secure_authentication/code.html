          },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- Top AppBar (Injected from Shared Components, but filtered for Auth flow - Hidden per 'Task-Focused' suppression rule) -->
<!-- However, the prompt asks for a "Confirm Payment" headline, which acts as the focused header -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-14 bg-surface/80 backdrop-blur-md">
<button aria-label="Cancel" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Confirm Payment</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col px-margin-mobile pt-24 pb-12">
<!-- Recipient Summary Card -->
<div class="bg-surface-container-low rounded-xl p-lg shadow-[0px_12px_32px_rgba(0,0,0,0.05)] border border-outline-variant/30 mb-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="flex items-center gap-md">
<div class="relative">
<img alt="Rahat" class="w-16 h-16 rounded-full border-2 border-primary-container" data-alt="A professional studio portrait of a young South Asian man with a friendly expression, set against a clean, minimalist blue gradient background. The lighting is soft and even, typical of high-end corporate fintech applications. The visual style is modern and clean, aligning with a premium neo-banking user experience and professional financial service aesthetics." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgx167fy7nZH2zmw-gfAo6m3NqnTha6w_8I9TA_Lw3wN8QGFEmfS2lFb0_v8kcVSus3FTewK7R_Z9Lgnwvfoh4Fp1ffXAdExuOe67oSt0jhH-4LtPBBamLhVxbk7GLhPk9bngGFKs9TwCm3kw0mK33_-VLuEs1anmbEWoQRgv5TyAtnvsRfr7WMl4chpBT-O5LsnMPSFIhR_4HrUMBF96taq_a3HupWGQNwscgtfp_Jh_GFQOXqtPeqysAB7k_UbZyH6BOoyDLIouI"/>
<div class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-full border-2 border-white">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Sending to</p>
<h2 class="font-headline-md-mobile text-headline-md-mobile text-on-surface">Rahat</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">+880 1712-345678</p>
</div>
</div>
<div class="mt-md pt-md border-t border-outline-variant/20 flex justify-between items-end">
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Amount</p>
<p class="font-amount-display text-amount-display text-on-surface">৳1,500</p>
</div>
<div class="text-right">
<p class="font-label-md text-label-md text-on-surface-variant">Fee</p>
<p class="font-body-lg text-body-lg text-on-surface">৳0.00</p>
</div>
</div>
</div>
<!-- Biometric Authentication Section -->
<div class="flex-1 flex flex-col items-center justify-center py-xl">
<div class="relative mb-lg">
<!-- Pulse Effect -->
<div class="absolute inset-0 bg-primary/10 rounded-full auth-pulse scale-150"></div>
<div class="relative w-24 h-24 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-lg">
<span class="material-symbols-outlined text-[48px]" id="auth-icon">fingerprint</span>
</div>
</div>
<div class="text-center mb-xl">
<p class="font-title-lg text-title-lg text-primary animate-pulse" id="auth-status">Authenticating...</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Touch the sensor or use PIN</p>
</div>
<!-- PIN Input Fallback -->
<div class="w-full max-w-[280px]">
<div class="flex justify-between items-center mb-md">
<span class="h-[1px] flex-1 bg-outline-variant/30"></span>
<span class="px-md font-label-md text-label-md text-on-surface-variant uppercase">or enter pin</span>
<span class="h-[1px] flex-1 bg-outline-variant/30"></span>
</div>
<div class="flex justify-center gap-md mb-xl" id="pin-container">
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant"></div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto">
<button class="w-full h-14 bg-primary text-on-primary font-title-lg text-title-lg rounded-xl shadow-lg active:scale-95 duration-150 transition-all flex items-center justify-center gap-2 group" id="pay-now-btn">
<span>Pay Now</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center font-label-md text-label-md text-on-surface-variant mt-md flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
                Bank-grade 256-bit secure transaction
            </p>
</div>
</main>
<!-- Simple PIN Pad (Overlay/Bottom Sheet style for Fallback) -->
<div class="hidden fixed bottom-0 left-0 w-full bg-surface-container-highest p-margin-mobile rounded-t-3xl shadow-2xl transition-transform duration-300 transform translate-y-full border-t border-outline-variant/20" id="numpad">
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mx-auto mb-lg"></div>
<div class="grid grid-cols-3 gap-4">
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">1</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">2</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">3</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">4</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">5</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">6</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">7</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">8</button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">9</button>
<button class="h-16 flex items-center justify-center"><span class="material-symbols-outlined">face</span></button>
<button class="numpad-key h-16 rounded-xl bg-surface-container-low font-title-lg text-title-lg flex items-center justify-center active:bg-primary-container/20">0</button>
<button class="h-16 flex items-center justify-center text-error" id="backspace"><span class="material-symbols-outlined">backspace</span></button>
</div>
</div>
<script>
        // Micro-interactions and simulation
        const dots = document.querySelectorAll('.pin-dot');
        const numpadKeys = document.querySelectorAll('.numpad-key');
        const backspace = document.getElementById('backspace');
        const numpad = document.getElementById('numpad');
        const pinContainer = document.getElementById('pin-container');
        const authStatus = document.getElementById('auth-status');
        const authIcon = document.getElementById('auth-icon');
        const payBtn = document.getElementById('pay-now-btn');
        
        let currentPin = '';

        // Open numpad on clicking dots
        pinContainer.addEventListener('click', () => {
            numpad.classList.remove('hidden');
            setTimeout(() => numpad.classList.remove('translate-y-full'), 10);
        });

        // PIN logic
        numpadKeys.forEach(key => {
            key.addEventListener('click', () => {
                if (currentPin.length < 5) {
                    dots[currentPin.length].classList.add('active', 'bg-primary');
                    currentPin += key.innerText;
                    
                    if (currentPin.length === 5) {
                        simulateSuccess();
                    }
                }
            });
        });

        backspace.addEventListener('click', () => {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                dots[currentPin.length].classList.remove('active', 'bg-primary');
            }
        });

        payBtn.addEventListener('click', () => {
            simulateSuccess();
        });

        function simulateSuccess() {
            authStatus.innerText = 'Verifying...';
            authStatus.classList.remove('text-primary');
            authStatus.classList.add('text-secondary');
            
            setTimeout(() => {
                authStatus.innerText = 'Authenticated';
                authStatus.classList.remove('text-secondary', 'animate-pulse');
                authStatus.classList.add('text-green-600');
                authIcon.innerText = 'check_circle';
                authIcon.parentElement.classList.replace('bg-primary-container', 'bg-green-100');
                authIcon.parentElement.classList.replace('text-on-primary-container', 'text-green-600');
                
                payBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
                
                setTimeout(() => {
                    payBtn.innerHTML = 'Payment Successful';
                    payBtn.classList.replace('bg-primary', 'bg-green-600');
                }, 1500);
            }, 1000);
        }

        // Randomly toggle FaceID icon for demonstration
        setInterval(() => {
            if (authIcon.innerText !== 'check_circle') {
                authIcon.innerText = authIcon.innerText === 'fingerprint' ? 'face' : 'fingerprint';
            }
        }, 3000);
    </script>
</body></html>
