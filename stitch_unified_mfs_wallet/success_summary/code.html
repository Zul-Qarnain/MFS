<script>
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#004ac6', '#b21474', '#16a34a', '#fbbf24', '#2563eb'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                const duration = 2 + Math.random() * 3;
                const delay = Math.random() * 0.5;
                
                confetti.style.transition = `all ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}s`;
                
                container.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.style.top = '110%';
                    confetti.style.left = (parseFloat(confetti.style.left) + (Math.random() * 20 - 10)) + '%';
                    confetti.style.transform = `rotate(${Math.random() * 1000}deg)`;
                }, 100);
                
                setTimeout(() => confetti.remove(), (duration + delay) * 1000);
            }
        }

        function copyId() {
            // Simple visual feedback for copy
            const icon = event.target;
            icon.innerText = 'check';
            setTimeout(() => icon.innerText = 'content_copy', 2000);
        }

        // Initialize confetti on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(createConfetti, 500);
        });
    </script>
