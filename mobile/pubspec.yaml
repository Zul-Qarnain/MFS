name: mfs_unified
description: MFS Unified — a single Android wallet for bKash, Nagad, and Rocket.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.0

  # Code generation
  freezed_annotation: ^2.4.4

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  mobile_scanner: ^6.0.2
  local_auth: ^2.3.0
  device_info_plus: ^11.1.1
  crypto: ^3.0.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.13
  freezed: ">=2.5.2 <2.5.8"
  json_serializable: ^6.8.0
  riverpod_generator: ">=2.4.0 <2.4.2"
  isar_generator: ^3.1.0+1
  retrofit_generator: ">=8.1.0 <9.0.0"
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
    - family: Geist
      fonts:
        - asset: fonts/Geist-Regular.ttf
          weight: 400
        - asset: fonts/Geist-Medium.ttf
          weight: 500
